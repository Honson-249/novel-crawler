# ReelShort CSV 爬虫 - Docker Compose 配置
version: '3.8'

services:
  # Web 服务 + 爬虫
  crawler:
    build: .
    container_name: reelshort-crawler
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REELSHORT_API_KEY=${REELSHORT_API_KEY:-kL9pQ2rS4tU6vW8xY0zA1bC3dE5fG7h}
      # HTTP 代理（可选，如需代理请取消注释并配置）
      - HTTP_PROXY=http://127.0.0.1:7897
      - HTTPS_PROXY=http://127.0.0.1:7897
      # - NO_PROXY=localhost,127.0.0.1,reelshort.com
    volumes:
      # CSV 数据目录
      - ./data/reelshort:/app/data/reelshort
      # 日志目录
      - ./logs:/app/logs
    restart: unless-stopped
